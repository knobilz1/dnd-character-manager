name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Write signing key to file (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TAURI_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_KEY" ]; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY secret is not set — update bundles will not be signed and latest.json will not be generated."
          else
            echo "$TAURI_KEY" > /tmp/tauri-signing.key
            echo "TAURI_SIGNING_PRIVATE_KEY_PATH=/tmp/tauri-signing.key" >> $GITHUB_ENV
            echo "Signing key written to /tmp/tauri-signing.key"
          fi

      - name: Write signing key to file (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAURI_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrEmpty($env:TAURI_KEY)) {
            Write-Output "::warning::TAURI_SIGNING_PRIVATE_KEY secret is not set — update bundles will not be signed."
          } else {
            $env:TAURI_KEY | Out-File -FilePath "$env:TEMP\tauri-signing.key" -Encoding utf8 -NoNewline
            "TAURI_SIGNING_PRIVATE_KEY_PATH=$env:TEMP\tauri-signing.key" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Output "Signing key written"
          }

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'DnD Sheet ${{ github.ref_name }}'
          releaseBody: |
            ## What's new in ${{ github.ref_name }}

            See commits for details. If you already have the app installed it will prompt you to update automatically.

            ### Install
            - **Mac (Apple Silicon)**: Download `Tavern.Sheet_*_aarch64.dmg`
            - **Mac (Intel)**: Download `Tavern.Sheet_*_x64.dmg`
            - **Windows**: Download `Tavern.Sheet_*_x64-setup.exe`

            ### macOS security warning
            macOS blocks unsigned apps. After installing, open Terminal and run:
            ```
            xattr -dr com.apple.quarantine "/Applications/Tavern Sheet.app"
            ```
            Or go to **System Settings → Privacy & Security → Open Anyway**.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: true
