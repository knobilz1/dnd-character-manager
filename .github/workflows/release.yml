name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Verify signing key is set
        shell: bash
        env:
          TAURI_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set. Add it in repo Settings → Secrets → Actions."
            exit 1
          fi
          echo "Signing key is present (length: ${#TAURI_KEY})"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'DnD Sheet ${{ github.ref_name }}'
          releaseBody: |
            ## What's new in ${{ github.ref_name }}

            See commits for details. If you already have the app installed it will prompt you to update automatically.

            ### Install
            - **Mac (Apple Silicon)**: Download `Tavern.Sheet_*_aarch64.dmg`
            - **Mac (Intel)**: Download `Tavern.Sheet_*_x64.dmg`
            - **Windows**: Download `Tavern.Sheet_*_x64-setup.exe`

            ### macOS security warning
            macOS blocks unsigned apps. After installing, open Terminal and run:
            ```
            xattr -dr com.apple.quarantine "/Applications/Tavern Sheet.app"
            ```
            Or go to **System Settings → Privacy & Security → Open Anyway**.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: false

  publish-updater:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys
          from datetime import datetime, timezone

          tag = os.environ['TAG']
          version = tag.lstrip('v')
          repo = os.environ['GITHUB_REPOSITORY']
          base_url = f"https://github.com/{repo}/releases/download/{tag}"

          # Download all .sig files from the release
          os.makedirs('sigs', exist_ok=True)
          result = subprocess.run(
              ['gh', 'release', 'download', tag, '--repo', repo, '--pattern', '*.sig', '--dir', 'sigs'],
              capture_output=True, text=True
          )
          if result.returncode != 0:
              print(f"Warning: {result.stderr}", file=sys.stderr)

          def read_sig(filename):
              path = f"sigs/{filename}"
              return open(path).read().strip() if os.path.exists(path) else ""

          aarch64_sig = read_sig("Tavern.Sheet_aarch64.app.tar.gz.sig")
          x64_sig     = read_sig("Tavern.Sheet_x64.app.tar.gz.sig")
          win_sig     = read_sig(f"Tavern.Sheet_{version}_x64_en-US.msi.sig")

          pub_date = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%S.000Z")

          data = {
              "version": version,
              "notes": f"See release notes at https://github.com/{repo}/releases/tag/{tag}",
              "pub_date": pub_date,
              "platforms": {}
          }

          if aarch64_sig:
              url = f"{base_url}/Tavern.Sheet_aarch64.app.tar.gz"
              data["platforms"]["darwin-aarch64"]     = {"signature": aarch64_sig, "url": url}
              data["platforms"]["darwin-aarch64-app"] = {"signature": aarch64_sig, "url": url}

          if x64_sig:
              url = f"{base_url}/Tavern.Sheet_x64.app.tar.gz"
              data["platforms"]["darwin-x86_64"]     = {"signature": x64_sig, "url": url}
              data["platforms"]["darwin-x86_64-app"] = {"signature": x64_sig, "url": url}

          if win_sig:
              url = f"{base_url}/Tavern.Sheet_{version}_x64_en-US.msi"
              data["platforms"]["windows-x86_64"]     = {"signature": win_sig, "url": url}
              data["platforms"]["windows-x86_64-msi"] = {"signature": win_sig, "url": url}

          if not data["platforms"]:
              print("ERROR: No signature files found — builds likely failed", file=sys.stderr)
              sys.exit(1)

          with open('latest.json', 'w') as f:
              json.dump(data, f, indent=2)

          print(json.dumps(data, indent=2))

          subprocess.run(
              ['gh', 'release', 'upload', tag, 'latest.json', '--repo', repo, '--clobber'],
              check=True
          )
          print(f"\nSuccessfully uploaded latest.json for {tag}")
          PYEOF
